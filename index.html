<!DOCTYPE html>
<html>
<head>
  <title>플타디 뽑기</title>
</head>

<body style="margin:0; font-family:sans-serif; background:#f2f2f2;">

<div style="display:flex; gap:20px; padding:30px; align-items:flex-start;">

  <!-- 📊 왼쪽 확률표 -->
  <div style="display:flex; flex-direction:column; gap:15px; width:220px;">

    <div style="background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
      <h3>📊 일반 뽑기</h3>
      <p>일반 ⚪ - 40%</p>
      <p>드문 🟢 - 25%</p>
      <p>레어 🔵 - 15%</p>
      <p>에픽 🟣 - 12%</p>
      <p>전설 🟡 - 7%</p>
      <p>신화 🔴🔥 - 1%</p>
    </div>

    <div style="background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
      <h3>💥 특수 뽑기</h3>
      <p>일반 ⚪ - 27%</p>
      <p>드문 🟢 - 25%</p>
      <p>레어 🔵 - 20%</p>
      <p>에픽 🟣 - 15%</p>
      <p>전설 🟡 - 10%</p>
      <p>신화 🔴🔥 - 3%</p>
    </div>

  </div>

  <!-- 🎮 일반 -->
  <div style="text-align:center; flex:1;">

    <h2>🎲 일반 뽑기</h2>

    <p>횟수 입력 (또는 Iz)</p>
    <input id="countNormal" type="number" value="0">

    <p>Iz 입력 (100 = 1회)</p>
    <input id="moneyNormal" type="number" value="0"> Iz

    <br><br>

    <button onclick="drawNormal()">일반 뽑기</button>

    <h3>결과</h3>
    <div id="resultNormal"></div>

  </div>

  <!-- 💥 특수 -->
  <div style="text-align:center; flex:1;">

    <h2>💥 특수 뽑기</h2>

    <p>횟수 입력 (또는 Iz)</p>
    <input id="countSpecial" type="number" value="0">

    <p>Iz 입력 (1000 = 1회)</p>
    <input id="moneySpecial" type="number" value="0"> Iz

    <br><br>

    <button onclick="drawSpecial()">특수 뽑기</button>

    <h3>결과</h3>
    <div id="resultSpecial"></div>

  </div>

</div>

<script>

  // ---------- 공통 ----------
  function getCount(countId, moneyId, price) {
    let manual = parseInt(document.getElementById(countId).value) || 0;
    let money = parseInt(document.getElementById(moneyId).value) || 0;

    if (manual > 0) {
      return manual;
    } else {
      return Math.floor(money / price);
    }
  }

  // ---------- 일반 ----------
  function getNormal() {
    let r = Math.random() * 100;

    if (r < 40) return "일반 ⚪";
    else if (r < 65) return "드문 🟢";
    else if (r < 80) return "레어 🔵";
    else if (r < 92) return "에픽 🟣";
    else if (r < 99) return "전설 🟡";
    else return "신화 🔴🔥";
  }

  function drawNormal() {
    let count = getCount("countNormal", "moneyNormal", 100);
    let box = document.getElementById("resultNormal");

    let result = {
      "일반 ⚪":0,"드문 🟢":0,"레어 🔵":0,
      "에픽 🟣":0,"전설 🟡":0,"신화 🔴🔥":0
    };

    for (let i = 0; i < count; i++) {
      result[getNormal()]++;
    }

    box.innerHTML = "";
    for (let k in result) {
      if (result[k] > 0)
        box.innerHTML += k + " - " + result[k] + "<br>";
    }
  }

  // ---------- 특수 ----------
  function getSpecial() {
    let r = Math.random() * 100;

    if (r < 27) return "일반 ⚪";
    else if (r < 52) return "드문 🟢";
    else if (r < 72) return "레어 🔵";
    else if (r < 87) return "에픽 🟣";
    else if (r < 97) return "전설 🟡";
    else return "신화 🔴🔥";
  }

  function drawSpecial() {
    let count = getCount("countSpecial", "moneySpecial", 1000);
    let box = document.getElementById("resultSpecial");

    let result = {
      "일반 ⚪":0,"드문 🟢":0,"레어 🔵":0,
      "에픽 🟣":0,"전설 🟡":0,"신화 🔴🔥":0
    };

    for (let i = 0; i < count; i++) {
      result[getSpecial()]++;
    }

    box.innerHTML = "";
    for (let k in result) {
      if (result[k] > 0)
        box.innerHTML += k + " - " + result[k] + "<br>";
    }
  }

</script>

</body>
</html>
