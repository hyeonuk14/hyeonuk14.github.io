<button onclick="checkServer()">서버 상태 확인</button>
<p id="status"></p>

<script>
async function checkServer() {
  const res = await fetch('https://api.mcsrvstat.us/2/hyeonuk4.feathermc.gg');
  const data = await res.json();

  const text = data.online
    ? `열림 ✅ (${data.players.online}/${data.players.max})`
    : '닫힘 ❌';

  document.getElementById('status').innerText = text;
}
</script>
