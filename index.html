<!DOCTYPE html>
<html>
<head>
  <title>플타디 뽑기</title>
</head>

<body style="margin:0; font-family:sans-serif; background:#f2f2f2;">

<div style="display:flex; justify-content:space-around; padding-top:30px;">

  <!-- 🎮 일반 -->
  <div style="text-align:center; width:250px;">
    <h2>🎲 일반 뽑기</h2>
    <p>100 Iz = 1회</p>

    <input id="count" type="number" min="1" value="10">
    <br><br>

    <input id="moneyNormal" type="number" value="0">
    Iz

    <br><br>

    <button onclick="drawNormal()">일반 뽑기</button>

    <h3>결과</h3>
    <div id="resultNormal"></div>
  </div>

  <!-- 💥 특수 -->
  <div style="text-align:center; width:250px;">
    <h2>💥 특수 뽑기</h2>
    <p>1000 Iz = 1회 (10배)</p>

    <input id="countSpecial" type="number" min="1" value="10">
    <br><br>

    <input id="moneySpecial" type="number" value="0">
    Iz

    <br><br>

    <button onclick="drawSpecial()">특수 뽑기</button>

    <h3>결과</h3>
    <div id="resultSpecial"></div>
  </div>

</div>

<script>

  // ---------- 일반 ----------
  function getNormal() {
    let r = Math.random() * 100;

    if (r < 40) return "일반 ⚪";
    else if (r < 65) return "드문 🟢";
    else if (r < 80) return "레어 🔵";
    else if (r < 92) return "에픽 🟣";
    else if (r < 99) return "전설 🟡";
    else return "신화 🔴🔥";
  }

  function drawNormal() {
    let money = parseInt(document.getElementById("moneyNormal").value) || 0;
    let count = Math.floor(money / 100);

    let box = document.getElementById("resultNormal");

    let result = {
      "일반 ⚪":0,"드문 🟢":0,"레어 🔵":0,
      "에픽 🟣":0,"전설 🟡":0,"신화 🔴🔥":0
    };

    for (let i = 0; i < count; i++) {
      result[getNormal()]++;
    }

    box.innerHTML = "";
    for (let k in result) {
      if (result[k] > 0)
        box.innerHTML += k + " - " + result[k] + "<br>";
    }
  }

  // ---------- 특수 ----------
  function getSpecial() {
    let r = Math.random() * 100;

    if (r < 27) return "일반 ⚪";
    else if (r < 52) return "드문 🟢";
    else if (r < 72) return "레어 🔵";
    else if (r < 87) return "에픽 🟣";
    else if (r < 97) return "전설 🟡";
    else return "신화 🔴🔥";
  }

  function drawSpecial() {
    let money = parseInt(document.getElementById("moneySpecial").value) || 0;
    let count = Math.floor(money / 1000); // 🔥 10배 가격

    let box = document.getElementById("resultSpecial");

    let result = {
      "일반 ⚪":0,"드문 🟢":0,"레어 🔵":0,
      "에픽 🟣":0,"전설 🟡":0,"신화 🔴🔥":0
    };

    for (let i = 0; i < count; i++) {
      result[getSpecial()]++;
    }

    box.innerHTML = "";
    for (let k in result) {
      if (result[k] > 0)
        box.innerHTML += k + " - " + result[k] + "<br>";
    }
  }

</script>

</body>
</html>
